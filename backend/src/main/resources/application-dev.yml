spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/haidian_intel_platform?useUnicode=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      initialization-fail-timeout: -1

management:
  health:
    db:
      enabled: true

logging:
  level:
    com.haidian.intel.platform: DEBUG
